<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>mockr · AI agent WS demo</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font: 14px/1.4 system-ui, sans-serif;
        margin: 0;
        background: #fafaf9;
        color: #1c1917;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 10px 16px;
        background: #fff;
        border-bottom: 1px solid #e7e5e4;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      header h1 { font-size: 14px; margin: 0; font-weight: 600; }
      .status {
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 999px;
        background: #f5f5f4;
      }
      .status.open { background: #dcfce7; color: #166534; }
      .status.closed { background: #fee2e2; color: #991b1b; }
      main {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .msg {
        max-width: 70%;
        padding: 8px 12px;
        border-radius: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .msg.user {
        align-self: flex-end;
        background: #1c1917;
        color: #fafaf9;
      }
      .msg.bot {
        align-self: flex-start;
        background: #fff;
        border: 1px solid #e7e5e4;
      }
      .msg.tool {
        align-self: flex-start;
        background: #fef9c3;
        border: 1px solid #fde047;
        font-family: ui-monospace, monospace;
        font-size: 12px;
      }
      .msg.system {
        align-self: center;
        background: transparent;
        color: #78716c;
        font-size: 12px;
      }
      footer {
        padding: 12px 16px;
        background: #fff;
        border-top: 1px solid #e7e5e4;
        display: flex;
        gap: 8px;
      }
      input, button {
        font: inherit;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid #d6d3d1;
      }
      input { flex: 1; }
      button {
        background: #1c1917;
        color: #fafaf9;
        border-color: #1c1917;
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: #1c1917;
      }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <header>
      <h1>Dot · WS demo</h1>
      <span id="status" class="status">connecting…</span>
      <span style="flex: 1"></span>
      <button id="ping" class="secondary" type="button">broadcast ping</button>
    </header>

    <main id="feed"></main>

    <footer>
      <input id="input" autocomplete="off" placeholder='try: "what is the weather", "show me floor 3", "fail"' />
      <button id="send" type="button">send</button>
      <button id="cancel" class="secondary" type="button" disabled>cancel</button>
    </footer>

    <script>
      const PORT = 3011;
      const WS_URL = `ws://${location.hostname || "localhost"}:${PORT}/ws/agent?conversationId=demo`;
      const POST_URL = `http://${location.hostname || "localhost"}:${PORT}/api/broadcast`;

      const feed = document.getElementById("feed");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const cancelBtn = document.getElementById("cancel");
      const pingBtn = document.getElementById("ping");
      const statusEl = document.getElementById("status");

      let sock;
      let activeBubble = null; // streaming bubble to append content_delta into

      function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = "status " + (cls || "");
      }

      function bubble(cls, text) {
        const el = document.createElement("div");
        el.className = "msg " + cls;
        el.textContent = text;
        feed.appendChild(el);
        feed.scrollTop = feed.scrollHeight;
        return el;
      }

      function setStreaming(streaming) {
        sendBtn.disabled = streaming;
        cancelBtn.disabled = !streaming;
        input.disabled = streaming;
      }

      function connect() {
        sock = new WebSocket(WS_URL);
        sock.addEventListener("open", () => setStatus("open", "open"));
        sock.addEventListener("close", () => {
          setStatus("closed", "closed");
          setStreaming(false);
        });
        sock.addEventListener("error", () => setStatus("error", "closed"));
        sock.addEventListener("message", (raw) => {
          let ev;
          try { ev = JSON.parse(raw.data); } catch { return; }
          handleEvent(ev);
        });
      }

      function handleEvent(ev) {
        switch (ev.type) {
          case "hello":
            bubble("system", `connected · conversation ${ev.conversationId}`);
            return;
          case "message_start":
            activeBubble = bubble("bot", "");
            return;
          case "content_delta":
            if (!activeBubble) activeBubble = bubble("bot", "");
            activeBubble.textContent += ev.text;
            feed.scrollTop = feed.scrollHeight;
            return;
          case "tool_use":
            bubble("tool", `→ ${ev.tool}(${JSON.stringify(ev.input)})`);
            return;
          case "tool_result":
            bubble("tool", `← ${JSON.stringify(ev.result)}`);
            return;
          case "message_stop":
            activeBubble = null;
            setStreaming(false);
            if (ev.stopReason && ev.stopReason !== "end_turn") {
              bubble("system", `stop: ${ev.stopReason}`);
            }
            return;
          case "broadcast":
            bubble("system", `📣 ${ev.text}`);
            return;
          case "__mockr_error":
            bubble("system", `validation: ${JSON.stringify(ev.issues)}`);
            return;
        }
      }

      sendBtn.addEventListener("click", () => {
        const content = input.value.trim();
        if (!content) return;
        if (!sock || sock.readyState !== sock.OPEN) return;
        bubble("user", content);
        input.value = "";
        setStreaming(true);
        sock.send(JSON.stringify({ type: "message", content }));
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !sendBtn.disabled) sendBtn.click();
      });

      cancelBtn.addEventListener("click", () => {
        if (!sock || sock.readyState !== sock.OPEN) return;
        sock.send(JSON.stringify({ type: "cancel" }));
      });

      pingBtn.addEventListener("click", async () => {
        try {
          const res = await fetch(POST_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: "ping" }),
          });
          const data = await res.json();
          bubble("system", `POST /api/broadcast → delivered=${data.delivered}`);
        } catch (err) {
          bubble("system", `broadcast failed: ${err.message}`);
        }
      });

      connect();
    </script>
  </body>
</html>
